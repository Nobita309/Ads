name: adblock

on:
  schedule:
    - cron: '0 */1 * * *'
  workflow_dispatch:

permissions:
  actions: write
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Mihomo (auto-detect asset; prefer .deb, fallback .gz)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          arch="$(dpkg --print-architecture)"

          rel_json=$(curl -fsSL -H "Authorization: token ${GITHUB_TOKEN}" \
            "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest")

          deb_url=$(echo "$rel_json" | jq -r \
            --arg arch "$arch" '
              .assets[]
              | select(.name | test("^mihomo-linux-" + $arch + "-"))
              | select(.name | endswith(".deb"))
              | .browser_download_url
            ' | head -n 1)

          # Fallback: asset .gz cho linux-<arch>
          gz_url=$(echo "$rel_json" | jq -r \
            --arg arch "$arch" '
              .assets[]
              | select(.name | test("^mihomo-linux-" + $arch + "-"))
              | select(.name | endswith(".gz"))
              | .browser_download_url
            ' | head -n 1)

          if [ -n "$deb_url" ] && [ "$deb_url" != "null" ]; then
            echo "Downloading .deb: $deb_url"
            curl -fsSL -o mihomo.deb "$deb_url"
            sudo dpkg -i mihomo.deb || (sudo apt-get update && sudo apt-get -f install -y && sudo dpkg -i mihomo.deb)
            rm -f mihomo.deb
          elif [ -n "$gz_url" ] && [ "$gz_url" != "null" ]; then
            echo "Downloading .gz: $gz_url"
            curl -fsSL -o mihomo.gz "$gz_url"
            gunzip -c mihomo.gz > mihomo
            rm -f mihomo.gz
            chmod +x mihomo
            sudo mv mihomo /usr/local/bin/mihomo
          else
            echo "No matching asset found for linux-$arch (.deb/.gz) in latest release." >&2
            echo "$rel_json" | jq '{tag_name, assets: [.assets[].name]}'
            exit 1
          fi

          echo "Installed Mihomo version:"
          (mihomo -v || /usr/bin/mihomo -v || true)

      - name: Download and convert TXT to MRS in parallel
        run: |
          set -euo pipefail

          conv() {
            URL="$1"; OUT="$2"
            while true; do
              curl -fsSL "$URL" -o "${OUT}.txt" && break
              echo "Retrying $OUT..."
              sleep 2
            done
            mihomo convert-ruleset domain text "${OUT}.txt" "${OUT}.mrs"
            rm -f "${OUT}.txt"
            echo "Converted ${OUT}.mrs"
          }

          conv "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/domains/pro.txt" pro &
          conv "https://big.oisd.nl/domainswild2" oisd &
          conv "https://cdn.jsdelivr.net/gh/hagezi/dns-blocklists@latest/domains/tif.txt" tif &
          wait

      - name: Commit and push if there are changes
        run: |
          set -euo pipefail
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.mrs
          if ! git diff --staged --quiet; then
            git commit -m "Update adblock MRS files"
            git push
          else
            echo "No changes to commit."
          fi

      - name: Delete workflow runs older than 7 days
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e

          cutoff=$(date -u -d '7 days ago' +%s)

          gh api \
            -H "Accept: application/vnd.github+json" \
            "/repos/${{ github.repository }}/actions/runs?per_page=100" \
            --paginate \
            --jq '.workflow_runs[] | "\(.id) \(.created_at)"' |
          while read -r run_id created_at; do
            run_time=$(date -u -d "$created_at" +%s)

            if [ "$run_time" -lt "$cutoff" ]; then
              echo "Deleting run $run_id created at $created_at"
              gh api \
                --method DELETE \
                -H "Accept: application/vnd.github+json" \
                "/repos/${{ github.repository }}/actions/runs/$run_id"
            fi
          done
